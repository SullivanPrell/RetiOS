name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Generate & build (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # RetiOS uses iOS 26 SDK APIs (e.g. `tabBarMinimizeBehavior`), guarded at
      # *runtime* with `if #available(iOS 26, *)`. `#available` doesn't relax the
      # *compile-time* SDK requirement, so the app must be built with the Xcode
      # that ships the iOS 26 SDK. The runner image carries it (iOS 26 simulator
      # runtimes are present) but defaults `xcodebuild` to an older Xcode — so
      # select the newest installed Xcode explicitly.
      - name: Select newest Xcode
        run: |
          newest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Installed Xcodes:"; ls -d /Applications/Xcode_*.app 2>/dev/null || true
          echo "Selecting: $newest"
          sudo xcode-select -s "$newest/Contents/Developer"
          xcodebuild -version
          echo "iOS SDKs:"; xcodebuild -showsdks | grep -i ios || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      # Resolves the ReticulumSwift-stack packages from their published releases.
      # Simulator builds don't require code signing. Use a *generic* simulator
      # destination rather than a named device (e.g. "iPhone 15") so the build
      # doesn't break when GitHub rolls the runner image and the specific device
      # disappears from the installed simulator list.
      - name: Build (iOS Simulator)
        run: |
          xcodebuild build \
            -project RetiOS.xcodeproj \
            -scheme RetiOS \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
