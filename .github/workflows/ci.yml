name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Generate & build (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # RetiOS uses iOS 26 SDK APIs (e.g. `tabBarMinimizeBehavior`), guarded at
      # *runtime* with `if #available(iOS 26, *)`. `#available` doesn't relax the
      # *compile-time* SDK requirement, so the app must be built with the Xcode
      # that ships the iOS 26 SDK. The runner image carries it (iOS 26 simulator
      # runtimes are present) but defaults `xcodebuild` to an older Xcode — so
      # select the newest installed Xcode explicitly.
      - name: Select newest Xcode
        run: |
          newest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Installed Xcodes:"; ls -d /Applications/Xcode_*.app 2>/dev/null || true
          echo "Selecting: $newest"
          sudo xcode-select -s "$newest/Contents/Developer"
          xcodebuild -version
          echo "iOS SDKs:"; xcodebuild -showsdks | grep -i ios || true

      - name: Install XcodeGen
        run: brew install xcodegen

      # Single source of truth: this is the exact script contributors run locally
      # via `make ci`, so a green build here is reproducible on any dev machine
      # (and vice-versa). It regenerates the project, installs the committed
      # lockfile (Package.resolved) so the ReticulumSwift stack builds at the
      # EXACT pinned versions rather than "latest", and builds the iOS Simulator
      # target pinned to arm64. Bump the pin deliberately with `make update`.
      # See scripts/ci.sh for the rationale.
      - name: Build (iOS Simulator)
        run: ./scripts/ci.sh

      # Unit tests. Kept as its own step so a logic failure is distinguishable
      # at a glance from a UI-test failure below.
      - name: Unit tests (iOS Simulator)
        run: make test

      # UI tests launch the real app and drive it through the accessibility
      # API. They exist to catch what nothing else here can: a scene that
      # forgets to inject an `@Environment` model traps at RUNTIME — it still
      # compiles, and unit tests never build a scene.
      #
      # iOS Simulator only, deliberately. macOS UI testing additionally
      # requires Accessibility permission granted to the process running
      # xcodebuild (otherwise every test fails with "has not loaded
      # accessibility" after a 60 s wait), which a hosted runner cannot grant
      # itself. See the header of RetiOSUITests.swift.
      - name: UI tests (iOS Simulator)
        run: make uitest
