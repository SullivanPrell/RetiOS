# XcodeGen specification. Run `xcodegen generate` in this directory to
# materialize `RetiOS.xcodeproj`.
name: RetiOS
options:
  bundleIdPrefix: dev.sprell
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  # Generate a broadly-compatible project format (Xcode 16+). Xcode 26 opens it
  # fine; this lets CI runners (which lag the newest Xcode) read the project too.
  xcodeVersion: "16.0"

# By default RetiOS consumes the four packages from their published GitHub
# releases, so the app can be cloned and built on its own.
#
# To develop the whole stack at once, check the four package repos out as
# sibling directories and switch these entries to local paths, e.g.:
#     ReticulumSwift:
#       path: ../ReticulumSwift
# then re-run `xcodegen generate`. (Or add them as local packages in Xcode via
# File ▸ Add Package Dependencies… ▸ Add Local…, which overrides the remote ref.)
packages:
  ReticulumSwift:
    url: https://github.com/SullivanPrell/ReticulumSwift.git
    from: 1.4.3
  LXMFSwift:
    url: https://github.com/SullivanPrell/LXMFSwift.git
    from: 1.1.4
  LXSTSwift:
    url: https://github.com/SullivanPrell/LXSTSwift.git
    from: 1.1.4
  NomadNetSwift:
    url: https://github.com/SullivanPrell/NomadNetSwift.git
    from: 1.1.2
  # Source editor for the Micron page editor (Pages screen). UIKit-only — its
  # Package.swift declares `platforms: [.iOS(.v14)]` and its sources are
  # unguarded `import UIKit`, so it is linked with `destinationFilters: [iOS]`
  # below and every use site is behind `#if os(iOS)`. See the dependency for
  # the verification that Xcode really does skip it for the macOS destination.
  Runestone:
    url: https://github.com/simonbs/Runestone.git
    from: 0.5.2

targets:
  RetiOS:
    type: application
    # Multi-destination target (Xcode 16+ "Multiplatform App" style): one
    # target compiles natively for iPhone, iPad, AND Mac — replacing the old
    # `platform: iOS` setup, under which the only way to run on a Mac was
    # Apple Silicon's "Designed for iPad" compatibility shim (the unmodified
    # iOS binary in a resizable window — what the BLE mesh logs were actually
    # exercising). The codebase already has real `#if os(macOS)` branches
    # (`StackController`'s daemon-probe, `SettingsView`'s `NSPasteboard`
    # clipboard helper, `RNSBrand`/`IdentityView`'s AppKit imports) that were
    # previously dead code — `SDKROOT = iphoneos` meant `os(macOS)` could
    # never be true at compile time. Declaring `macOS` here is what finally
    # lets that code compile and run for real, as a genuine native Mac app
    # (its own SDK, AppKit-hosted, proper window chrome) rather than an iPad
    # app wearing a Mac's clothes.
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    # Both suites belong to the generated scheme. Stated explicitly rather than
    # left to inference: `RetiOSTests` was silently absent from it, so
    # `-only-testing:RetiOSTests` had always failed and the unit tests had never
    # run outside Xcode.
    scheme:
      testTargets:
        - RetiOSTests
        - RetiOSUITests
    sources:
      - path: RetiOS
    info:
      path: RetiOS/Info.plist
      # NOTE: kept in sync with the live `Info.plist` BY HAND — `xcodegen
      # generate` *regenerates* (overwrites, doesn't merge) the file at
      # `path` from exactly these properties. Letting this drift from the
      # real file — as it had, until this edit — means the next regenerate
      # silently regresses every key added straight to the plist via Xcode's
      # UI back to whatever's written here. Lost like this once already:
      # the BLE-mesh-aware Bluetooth description, the location-usage string
      # (Map tab), and the `bluetooth-central`/`bluetooth-peripheral`
      # background modes BLE Mesh needs to keep meshing while backgrounded.
      properties:
        # App version — DO NOT hardcode here. These expand at build time from
        # MARKETING_VERSION / CURRENT_PROJECT_VERSION in the `settings` block
        # below, which is the single source of truth (kept in sync with the git
        # tag vX.Y.Z).
        #
        # They used to be literals, and that shipped a wrong version: xcodegen
        # regenerates RetiOS/Info.plist wholesale from this block, so editing
        # the plist directly and then running `make update` (which calls
        # scripts/generate.sh) silently reverted it. v0.3.3 went out reporting
        # "0.3.1 (7)" exactly that way — the plist edit was overwritten by these
        # two stale lines. Referencing the build settings makes the two
        # physically incapable of disagreeing.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSBluetoothAlwaysUsageDescription: "RetiOS uses Bluetooth to communicate with RNode LoRa hardware and to mesh directly with nearby devices over BLE."
        NSMicrophoneUsageDescription: "RetiOS uses the microphone for voice calls over the mesh."
        NSLocalNetworkUsageDescription: "RetiOS uses the local network — including IPv6 multicast — to discover and communicate with nearby Reticulum and Yggdrasil mesh nodes."
        NSLocationWhenInUseUsageDescription: "RetiOS shows your position on the map and can include it when sharing location with the mesh."
        NSBonjourServices:
          - "_rnsd._tcp"
          - "_rnsd._udp"
        UIBackgroundModes:
          - fetch
          - network-authentication
          - bluetooth-central
          - bluetooth-peripheral
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sprell.retios
        # THE app version. `info.properties` above references these via
        # $(MARKETING_VERSION)/$(CURRENT_PROJECT_VERSION), so this block is the
        # only place a release bump has to happen. Keep in sync with the git tag.
        #
        # These were previously set ONLY on the YggdrasilTunnel extension, never
        # on the app — so bumping "the version" in this file silently bumped the
        # extension while the app's version came solely from literals in
        # `info.properties`. That is how v0.3.3 shipped reporting "0.3.1 (7)".
        MARKETING_VERSION: "0.3.7"
        CURRENT_PROJECT_VERSION: "13"
        # Apple Developer Team ID, substituted from the DEVELOPMENT_TEAM
        # environment variable by scripts/generate.sh, which reads it from the
        # gitignored .xcode-team file. Do NOT hardcode a team here: this file is
        # public, and a literal was previously kept only in the untracked
        # project.pbxproj — so every `make generate` silently reverted signing to
        # blank and broke local Mac and device builds until it was set by hand in
        # Xcode again. Unset substitutes to "", the open-source default; CI is
        # unaffected either way (scripts/ci.sh builds CODE_SIGNING_ALLOWED=NO).
        DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
        CODE_SIGN_STYLE: Automatic
        # App Group + Network Extension (personal VPN) entitlements so the app
        # can drive the YggdrasilTunnel packet-tunnel extension. Requires a team
        # with the Network Extensions + App Groups capabilities; harmless (unused)
        # when the Yggdrasil node is left disabled. See YGGDRASIL.md.
        CODE_SIGN_ENTITLEMENTS: RetiOS/RetiOS.entitlements
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        # Now that `macOS` is a first-class destination with its own native
        # build, turn off the "run the iOS binary as-is on Apple Silicon"
        # compatibility shim — leaving it on would offer two confusingly
        # similar Mac destinations ("My Mac" and "My Mac (Designed for
        # iPad)") and risk Xcode/the user picking the wrong one out of habit,
        # silently undoing the whole point of this change.
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: ReticulumSwift
        product: ReticulumSwift
      - package: LXMFSwift
        product: LXMF
      - package: LXSTSwift
        product: LXST
      - package: NomadNetSwift
        product: NomadNet
      # iOS ONLY. Runestone is UIKit-based and this is one multi-destination
      # target that also builds a native (non-Catalyst) Mac app, so linking it
      # unconditionally fails the macOS compile with "no such module 'UIKit'".
      #
      # `destinationFilters` makes XcodeGen emit `platformFilters = (ios, );` on
      # the build file. That is documented as a *linking* filter, so it was not
      # obvious it would also keep Runestone out of the macOS *compile* — it
      # does: with this in place a macOS build produces no Runestone build
      # intermediate at all (Intermediates.noindex contains no Runestone.build),
      # while the iOS build emits Runestone.o, TreeSitter.o and the
      # Runestone_Runestone.bundle resource bundle. Verified on this project,
      # not just in a spike; re-verify if XcodeGen is upgraded.
      - package: Runestone
        product: Runestone
        destinationFilters: [iOS]
      # The Yggdrasil engine (gomobile-built). The app links it for config/keygen
      # (MobileGenerateConfigJSON); the extension runs the node. Rebuild with
      # scripts/build-yggdrasil-xcframework.sh.
      - framework: Frameworks/Yggdrasil.xcframework
        embed: true
        codeSignOnCopy: true
      # Embed the packet-tunnel network extension into the app.
      - target: YggdrasilTunnel
        embed: true

  # Yggdrasil packet-tunnel network extension — runs the embedded yggdrasil-go
  # engine and gives the device a real Yggdrasil IPv6 (split-tunnel 0200::/7).
  YggdrasilTunnel:
    type: app-extension
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: YggdrasilTunnel
        # Info.plist and entitlements are wired via build settings below, not
        # compiled/copied as sources.
        excludes:
          - "Info.plist"
          - "YggdrasilTunnel.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sprell.retios.YggdrasilTunnel
        PRODUCT_NAME: YggdrasilTunnel
        # Hand-written Info.plist (carries the NSExtension packet-tunnel dict).
        # Referenced via INFOPLIST_FILE — NOT `info:` — so `xcodegen generate`
        # does not regenerate/overwrite it (which would drop NSExtension).
        INFOPLIST_FILE: YggdrasilTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: YggdrasilTunnel/YggdrasilTunnel.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: YggdrasilTunnel/YggdrasilTunnel-Bridging-Header.h
        DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        # Must match the app target's version — the App Store rejects a bundle
        # whose embedded extension disagrees with its container.
        MARKETING_VERSION: "0.3.7"
        CURRENT_PROJECT_VERSION: "13"
        # The extension is an app extension bundled in the app; keep its own copy
        # of the engine framework so it always loads (see comment on embed below).
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
    dependencies:
      - framework: Frameworks/Yggdrasil.xcframework
        embed: true
        codeSignOnCopy: true

  RetiOSTests:
    type: bundle.unit-test
    # Multi-destination like the app, not `platform: iOS`. As an iOS-only
    # target it broke `xcodebuild test -destination platform=macOS` for the
    # whole scheme — the run failed before any test executed, with
    # "Could not find test host for RetiOSTests: TEST_HOST evaluates to
    # .../Debug-iphoneos/RetiOS.app/RetiOS", because the scheme still resolves
    # every test target's host even under `-only-testing:`. The sources use no
    # UIKit and no `#if os(iOS)`, so they build for Mac unchanged.
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: RetiOSTests
    settings:
      base:
        # Both are required for `xcodebuild test` to pass: without an explicit
        # team + automatic signing the test bundle fails code signing, and
        # without a generated Info.plist the bundle is rejected at load time.
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Automatic
        # Substituted from $DEVELOPMENT_TEAM — see the app target above.
        DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
        # Hosted by the app, which `@testable import RetiOS` requires. Without
        # these the autogenerated scheme leaves this target out entirely and
        # `xcodebuild test -only-testing:RetiOSTests` fails with "isn't a member
        # of the specified test plan or scheme" — so these tests had never
        # actually run from the command line.
        #
        # `$(BUNDLE_EXECUTABLE_FOLDER_PATH)` is what keeps this working on both
        # destinations: it expands to `Contents/MacOS` on macOS and to nothing
        # on iOS. Hard-coding either path is what previously broke the other
        # platform's run before a single test executed.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/RetiOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/RetiOS"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: RetiOS

  # UI tests run the real app and drive it through the accessibility API.
  #
  # Worth the target for one specific reason: `@Environment(SomeModel.self)` is
  # non-optional and **traps at runtime** when a scene forgets to inject it —
  # it does not fail to compile, and unit tests never construct a scene, so
  # nothing else in this project can catch it. macOS makes that sharper still,
  # because the Preferences window (⌘,) is a *separate* `Settings` scene with
  # its own environment; a screen reachable from both the main window and
  # Preferences can work in one and crash in the other.
  #
  # Driving the app needs Accessibility permission granted to whatever runs the
  # automation. On the iOS Simulator the harness gets that itself, so the suite
  # runs unattended and in CI. **macOS does not**: without a grant every test
  # fails with "has not loaded accessibility" after a 60 s wait, and even with
  # one, `app.launch()` fails with "Failed to activate application (current
  # state: Running Background)" whenever another app holds focus. CI therefore
  # runs the iOS destination only; run the Mac one from Xcode.app.
  #
  # `supportedDestinations` (not `platform: iOS`, as the unit-test target uses)
  # so the same suite runs against the native Mac build too.
  RetiOSUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: RetiOSUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
        # Names the app this bundle launches and attaches to.
        TEST_TARGET_NAME: RetiOS
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: RetiOS
